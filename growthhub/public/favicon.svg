<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="gh-gold" x1="12" y1="10" x2="52" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E7D4A2" stop-opacity="0.95" />
      <stop offset="0.52" stop-color="#C8A45D" stop-opacity="0.92" />
      <stop offset="1" stop-color="#8FA3C9" stop-opacity="0.9" />
    </linearGradient>
    <radialGradient id="gh-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(20 16) rotate(55) scale(52 46)">
      <stop stop-color="#C8A45D" stop-opacity="0.22" />
      <stop offset="1" stop-color="#0A0A0A" stop-opacity="0" />
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.35" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="16" fill="#0B0B0F" />
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#gh-glow)" />
  <rect x="4" y="4" width="56" height="56" rx="16" stroke="rgba(255,255,255,0.10)" />

  <g filter="url(#soft)">
    <text
      x="32"
      y="41.5"
      text-anchor="middle"
      font-size="34"
      font-weight="800"
      letter-spacing="-1.5"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
      fill="url(#gh-gold)"
    >G</text>
  </g>
</svg>